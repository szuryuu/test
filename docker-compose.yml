services:
  # ── PostgreSQL 17 ──────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-kasiraiai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kasiraiai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Go Backend (Gin + pgx) ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: "8080"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-kasiraiai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSL_MODE: disable
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-25}
      DB_MAX_IDLE_CONNECTIONS: ${DB_MAX_IDLE_CONNECTIONS:-5}

      JWT_SECRET: ${JWT_SECRET:-ganti_dengan_secret_panjang_minimal_32_karakter}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-72}

      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_MAX_TOKENS: ${DEEPSEEK_MAX_TOKENS:-1000}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-30}

      FONNTE_API_KEY: ${FONNTE_API_KEY:-}
      FONNTE_BASE_URL: ${FONNTE_BASE_URL:-https://api.fonnte.com}
      FONNTE_DEVICE: ${FONNTE_DEVICE:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Vue 3 Frontend (Vite → nginx) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
