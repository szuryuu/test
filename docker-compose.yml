# docker-compose.yml (Docker Compose v2 — tanpa key "version")
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kasiraiai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
